        display: block;

    }

    .accordion+.title {
        user-select: none;

        line-height: 24px;
        color: white;
    }

        display: block;

        display: none;
    }

    .accordion~.title .down-icon {
        display: none;
    }

    .accordion:checked~.title .down-icon {
        display: block;
    }

    .accordion~.content {
        display: none;

    .accordion:checked~.content {
