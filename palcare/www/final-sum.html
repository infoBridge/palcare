<style>
    .form-control {
        width: 60%;
    }

    .form-control1 {
width: 60%;
height: 34px;
padding: 6px 12px;
font-size: 14px;
background-image: none;
border: 1px solid #F4F5F6;
border-radius: 4px;
}
</style>

<form id="mindhunter">
    <datalist id="patientid">
        <option value="">
    </datalist>
    <label style="font-size:larger ;"><b>New Final Summary
        </b></label>
    <input type="button" class="btn btn-primary float-right" id="final_button"
        style="right:10%; z-index:9;background-color: #395F6F;color: white;" value="Save">
        <br><br>
    <div style="width: 90%;background-color: #F9FAFA;border-radius: 7px;margin-left: 7%;">
        <div class="form-row" style="margin-left: -5%;">
            <div class="form-check col-md-12" style="padding-left: 7%;">
                <br>
                <input class="form-check-input" type="checkbox" id="npatient" onclick="myFunction()" style="margin-left: .2%;">
                <label class="form-check-label" for="gridCheck" style="margin-left: .2%;">New Patient</label>
            </div>
            <div class="form-check col-md-12" style="padding-left: 7%;">
                <input class="form-check-input" type="checkbox" id="epatient" style="margin-left: .2%;" onclick="myFunction()">
                <label class="form-check-label" for="gridCheck" style="margin-left: .2%;">Existing Patient</label>
            </div><br><br>
            <label style="font-size:larger ;padding-left: 7%;"><b>Final Summary (Incl Karnofsky)</b></label>
            <div class="form-group col-md-12" style="padding-left: 7%;" id="pdisplay">
                <label for="inputEmail4">Patient <span style="color:red;">*</span></label>
                <input type="text" class="form-control" id="patient" placeholder="" list="patientid">
            </div>
            <div class="form-group col-md-12" style="padding-left: 7%;" id="fdisplay">
                <label for="inputEmail4">First Name <span style="color:red;">*</span></label>
                <input type="text" class="form-control" id="first_name" placeholder="">
            </div>
            <div class="form-group col-md-12" style="padding-left: 7%;" id="sdisplay">
                <label for="inputEmail4">Surname <span style="color:red;">*</span></label>
                <input type="text" class="form-control" id="surname" placeholder="">
            </div>
            <div class="form-group col-md-12" style="padding-left: 7%;" id="nameP">
                <label for="inputPassword4">Patient Name</label>
                <input type="text" readonly class="form-control" id="patientname" placeholder="">
            </div>
            <div class="form-group col-md-12" style="padding-left: 7%;">
                <label for="inputPassword4">Date <span style="color:red;">*</span></label>
                <input type="date" class="form-control" id="date" placeholder="" required="true">
            </div>
            <div class="form-group col-md-12" style="padding-left: 7%;">
                <label for="inputState">Care Priority</label><br>
                <select id="carep" class="form-control1">
                    <option selected></option>
                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>
                </select>
            </div>
            <div class="form-group col-md-12" style="padding-left: 7%;">
                <label for="inputState">Visit Frequency</label><br>
                <select id="visitf" class="form-control1">
                    <option selected></option>
                    <option>Bi-weekly</option>
                    <option>Weekly</option>
                    <option>Fortnightly</option>
                    <option>Monthly</option>
                    <option>On Call</option>
                </select>
            </div>

            <div class="form-group col-md-12" style="padding-left: 7%;">
                <label for="inputState">Strong Opioids</label><br>
                <select id="strong" class="form-control1">
                    <option selected></option>
                    <option>Yes</option>
                    <option>No</option>
                </select>
            </div>

            <div class="form-group col-md-12" style="padding-left: 7%;">
                <label for="inputState">Anti Depressants</label><br>
                <select id="depress" class="form-control1">
                    <option selected></option>
                    <option>Yes</option>
                    <option>No</option>
                </select>
            </div>
            <div class="form-group col-md-12" style="padding-left: 7%;">
                <label for="inputState">Pain Score</label><br>
                <select id="painscore1" class="form-control1">
                    <option selected></option>
                    <option>0</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                    <option>7</option>
                    <option>8</option>
                    <option>9</option>
                    <option>10</option>

                </select>
            </div>
            <div class="form-group col-md-12" style="padding-left: 7%;">
                <label for="inputState">Nausea Score</label><br>
                <select id="nausea1" class="form-control1">
                    <option selected></option>
                    <option>0</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                    <option>7</option>
                    <option>8</option>
                    <option>9</option>
                    <option>10</option>

                </select>
            </div>
            <div class="form-group col-md-12" style="padding-left: 7%;">
                <label for="inputState">Dyspnoea Score</label><br>
                <select id="dyspnoea1" class="form-control1">
                    <option selected></option>
                    <option>0</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                    <option>7</option>
                    <option>8</option>
                    <option>9</option>
                    <option>10</option>
                </select>
            </div>

            <div class="form-group col-md-12" style="padding-left: 7%;">
                <label for="inputState">GHQ 12</label><br>
                <select id="ghq12" class="form-control1">
                    <option selected></option>
                    <option>0</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                    <option>7</option>
                    <option>8</option>
                    <option>9</option>
                    <option>10</option>
                </select>
            </div>



            <div class="form-group col-md-12" style="padding-left: 7%;">
                <label for="inputState">Family Support</label><br>
                <select id="family" class="form-control1">
                    <option selected></option>
                    <option>Supportive</option>
                    <option>Non-Supportive</option>
                </select>
            </div>
            <div class="form-group col-md-12" style="padding-left: 7%;">
                <label for="inputState">Family Functional Status</label><br>
                <select id="functinal" class="form-control1">
                    <option selected></option>
                    <option>Functional</option>
                    <option>Semi-Functional</option>
                    <option>Dysfunctional</option>
                </select>
            </div>
            <div class="form-group col-md-12" style="padding-left: 7%;">
                <label for="inputState">Caregiver Attitude</label><br>
                <select id="caregiver" class="form-control1">
                    <option selected></option>
                    <option>Positive</option>
                    <option>Negative</option>
                </select>
            </div>
            <div class="form-group col-md-12" style="padding-left: 7%;">
                <label for="inputState">Patient's Insight</label><br>
                <select id="pinsight" class="form-control1">
                    <option selected></option>
                    <option>Aware</option>
                    <option>Don't Want to Know</option>
                    <option>Denial</option>
                    <option>Want to Know</option>
                    <option>Collusion</option>
                </select>
            </div>
            <div class="form-group col-md-12" style="padding-left: 7%;">
                <label for="inputState">Communication pattern</label><br>
                <select id="cummunication" class="form-control1">
                    <option selected></option>
                    <option>Withdrawn</option>
                    <option>Easy to talk</option>
                    <option>Slurred Speech</option>
                    <option>Unable to Talk</option>
                </select>
            </div>
            <div class="form-group col-md-12" style="padding-left: 7%;">

                <label>Karnofsky Performance Scale</label>
                <input type="text" class="form-control" id="scale" placeholder="">
            </div>
            <p style="padding-left: 7%;color:#8A8A8A;">0-100</p>
            <div class="form-group col-md-12" style="padding-left: 7%;">

                <label>Completed by PALCARE team member</label>
                <input type="text" class="form-control" id="palteam" placeholder="">

            </div>
            <br>
        </div>
    </div>
</form>
