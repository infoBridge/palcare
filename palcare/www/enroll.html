<style>
    .panel {

    #cam {

    }

    #photo {
        border: 1px;

    .accordion-wrapper {
        display: block;
        max-width: 100%;
        margin: 0 auto;
        margin-top: 12px;
        margin-bottom: 12px;
    }

    .accordion+.title {
        user-select: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 5px;
        background: #395F6F;

        border-radius: 4px;
    }

    .accordion~.title strong {
        line-height: 24px;
        color: white;
    }

    .accordion~.title .side-icon {
        display: block;
    }

    .accordion:checked~.title .side-icon {
        display: none;
    }

    .accordion~.title .down-icon {
        display: none;
    }

    .accordion:checked~.title .down-icon {
        display: block;
    }

    .accordion~.content {
        display: none;
        padding: 8px;
        cursor: pointer;
    }

    .accordion:checked~.content {
        display: block;
    }

    .form-control1 {
        width: 100%;
        height: 34px;
        padding: 6px 12px;
        font-size: 14px;
        background-image: none;
        border: 1px solid #F4F5F6;
        border-radius: 4px;
    }
</style>
